name: Build ARMv6 for NextPi2

on:
  push:
    branches: [ master ]
  workflow_dispatch:    # erlaubt manuellen Start per Knopfdruck

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install FPC and ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc binutils-arm-linux-gnueabihf

      - name: Build for ARMv6
        run: |
          fpc -Parm -CpARMv6 -Cfvfpv2 \
              -dNEXTPI \
              -o pasta80-armv6 \
              pasta.pas

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pasta80-armv6
          path: pasta80-armv6